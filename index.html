<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🏆 口算小能手 | 100以内挑战 + 错题本</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #f6e3b4 0%, #ffcd94 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'PingFang SC', Roboto, sans-serif;
            padding: 20px;
            margin: 0;
        }

        .master-card {
            max-width: 750px;
            width: 100%;
            background: #fffef5;
            border-radius: 80px 80px 70px 70px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2), 0 0 0 8px #ffd966, 0 0 0 12px #ffa559;
            overflow: hidden;
        }

        .hero {
            background: #ffa559;
            padding: 18px 20px 12px;
            text-align: center;
            color: white;
        }
        .hero h1 {
            font-size: 2rem;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .hero h1 span {
            background: white;
            color: #ff8c42;
            padding: 0 18px;
            border-radius: 60px;
            font-size: 1.7rem;
        }

        .difficulty-bar {
            display: flex;
            justify-content: center;
            gap: 18px;
            padding: 20px 20px 10px;
            background: #fff1dc;
            flex-wrap: wrap;
        }
        .difficulty-btn {
            background: #ffe0b5;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 12px 16px;
            border-radius: 48px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #c28a4e;
            color: #7b3f00;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 100px;
            line-height: 1.4;
        }
        .difficulty-btn .star {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }
        .difficulty-btn .diff-title {
            font-size: 1.1rem;
            font-weight: 800;
        }
        .difficulty-btn .diff-desc {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        .difficulty-btn.active {
            background: #ffaa55;
            color: white;
            box-shadow: 0 2px 0 #b45f1b;
            transform: translateY(2px);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            background: #ffefcf;
            margin: 12px 20px 0;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.3rem;
            color: #8b5a2b;
            flex-wrap: nowrap;
            gap: 12px;
        }
        .info-panel div {
            background: #fffae9;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex: 1;
            justify-content: center;
        }

        .action-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 12px 20px 0;
        }
        .sec-btn {
            background: #eeddbb;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s;
            color: #5d3a1a;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .sec-btn:active { transform: scale(0.96); }

        .quiz-area {
            background: #ffffff;
            margin: 20px 25px 10px;
            border-radius: 68px;
            padding: 35px 20px;
            text-align: center;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.1), inset 0 1px 4px #ffeecc;
        }
        .expression {
            font-size: 4rem;
            font-weight: 800;
            background: #fff7e8;
            padding: 30px 10px;
            border-radius: 60px;
            color: #c96f0e;
            font-family: 'Microsoft YaHei', '微软雅黑', 'Segoe UI', 'PingFang SC', Roboto, monospace;
            letter-spacing: 6px;
            word-break: break-word;
        }

        .main-btn {
            background: #6c9ebf;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 16px 35px;
            border-radius: 80px;
            cursor: pointer;
            font-family: inherit;
            color: white;
            box-shadow: 0 7px 0 #3e5e77;
            transition: 0.07s linear;
            margin-top: 15px;
            width: 80%;
            max-width: 280px;
        }
        .main-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #3e5e77; }
        .main-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* 新增 × 按钮 */
        .wrong-mark-btn {
            background: #e67e22;
            border: none;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            color: white;
            box-shadow: 0 5px 0 #b45f1b;
            transition: 0.05s linear;
            margin-top: 12px;
            width: auto;
            min-width: 80px;
        }
        .wrong-mark-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b45f1b; }
        .wrong-mark-btn:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

        .slow-box {
            background: #fff3e0;
            margin: 15px 25px 10px;
            border-radius: 50px;
            padding: 15px 20px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }
        .slow-box h3 {
            margin: 0 0 12px 0;
            color: #b45f1b;
            font-size: 1.25rem;
            text-align: center;
        }
        .slow-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-weight: bold;
        }
        .slow-table th, .slow-table td {
            padding: 8px 5px;
            border-bottom: 1px dashed #ffcf8a;
        }
        .slow-table th { background: #ffe0b5; }

        /* 错题本按钮 */
        .mistake-btn {
            display: block;
            background: #f39c12;
            color: white;
            text-align: center;
            margin: 8px 25px 15px;
            padding: 10px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #b45f1b;
            transition: 0.05s linear;
        }
        .mistake-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #b45f1b; }

        .congrats {
            background: #ffd966;
            text-align: center;
            padding: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #77450e;
            margin-top: 5px;
            display: none;
        }
        .congrats.show { display: block; }

        footer {
            font-size: 0.8rem;
            text-align: center;
            background: #ffefcf;
            padding: 8px;
        }

        /* 模态框通用 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff9ef;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            border-radius: 60px;
            padding: 20px;
            position: relative;
            overflow-y: auto;
        }
        .close-modal {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 32px;
            cursor: pointer;
            font-weight: bold;
            color: #aa6f2c;
        }
        .mistake-diff-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .mistake-diff-btn {
            background: #ffda99;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .mistake-diff-btn.active {
            background: #ffaa55;
            color: white;
        }
        .mistake-list {
            max-height: 50vh;
            overflow-y: auto;
        }
        .mistake-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff5e6;
            margin: 8px 0;
            padding: 8px 15px;
            border-radius: 40px;
            font-weight: bold;
        }
        .mistake-item span {
            font-size: 1.2rem;
        }
        .del-single {
            background: #e67e22;
            border: none;
            color: white;
            border-radius: 30px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .clear-all-mistake {
            background: #e67e22;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
        @media (max-width: 550px) {
            .expression { font-size: 2.5rem; }
            .main-btn { font-size: 1.4rem; padding: 12px 20px; }
            .info-panel { font-size: 1rem; }
            .difficulty-btn { min-width: 80px; padding: 8px 12px; }
            .wrong-mark-btn { font-size: 1.3rem; padding: 6px 16px; }
        }
    </style>
</head>
<body>

<div class="master-card">
    <div class="hero">
        <h1>🏆 口算小能手 <span>100以内</span></h1>
    </div>

    <div class="difficulty-bar">
        <button class="difficulty-btn" data-diff="easy">
            <span class="star">⭐</span>
            <span class="diff-title">难度1</span>
            <span class="diff-desc">简单加减</span>
        </button>
        <button class="difficulty-btn" data-diff="medium">
            <span class="star">⭐⭐</span>
            <span class="diff-title">难度2</span>
            <span class="diff-desc">不进位不退位</span>
        </button>
        <button class="difficulty-btn" data-diff="hard">
            <span class="star">⭐⭐⭐</span>
            <span class="diff-title">难度3</span>
            <span class="diff-desc">进位退位</span>
        </button>
    </div>

    <div class="info-panel">
        <div>📋 <span id="currentIndex">0</span> / <span id="totalNum">50</span></div>
        <div>⏱️ <span id="timerDisplay">0.0</span> s</div>
    </div>

    <div class="action-row">
        <button id="openRecordBtn" class="sec-btn">📖 训练记录</button>
        <button id="restartBtn" class="sec-btn">🔄 重开</button>
    </div>

    <div class="quiz-area">
        <div class="expression" id="expressionText">20 + 10</div>
        <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
            <button id="actionMainBtn" class="main-btn">🚀 开始</button>
        </div>
        <!-- × 按钮放在下一题下方 (实际在主按钮旁边，但为了布局单独一行) -->
        <div style="margin-top: 12px;">
            <button id="markWrongBtn" class="wrong-mark-btn" disabled>❌ 错题收录</button>
        </div>
    </div>

    <div class="slow-box">
        <h3>🐢 本轮用时最久的5道题</h3>
        <table class="slow-table" id="slowTable">
            <thead><tr><th>算式</th><th>用时(秒)</th></tr></thead>
            <tbody id="slowTableBody"><tr><td colspan="2">✨ 本轮结束后显示最慢题目 ✨</td></tr></tbody>
        </table>
    </div>

    <!-- 错题本按钮 -->
    <div id="openMistakeBtn" class="mistake-btn">📓 错题本</div>

    <div id="congratsMsg" class="congrats">🏆 完成啦！好棒！🏆</div>
    <footer>✨ 点击下一题计时，若答错可点「❌ 错题收录」✨</footer>
</div>

<!-- 历史记录模态框 -->
<div id="recordModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2>📜 训练记录本</h2>
        <div class="modal-difficulty" id="modalDiffBtns">
            <button class="modal-diff-btn" data-modal-diff="easy">⭐ 简单</button>
            <button class="modal-diff-btn" data-modal-diff="medium">⭐⭐ 中等</button>
            <button class="modal-diff-btn" data-modal-diff="hard">⭐⭐⭐ 困难</button>
        </div>
        <div class="record-header">
            <span>🏅 最快成绩: <span id="fastestSpan">—</span></span>
            <button id="clearHistoryBtn" class="clear-record">🗑️ 清除记录</button>
        </div>
        <table class="history-table" id="historyTable">
            <thead><tr><th>训练日期</th><th>总用时(秒)</th></tr></thead>
            <tbody id="historyBody"><tr><td colspan="2">暂无记录</td></tr></tbody>
        </table>
    </div>
</div>

<!-- 错题本模态框 -->
<div id="mistakeModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeMistakeModal">&times;</span>
        <h2>📘 我的错题本</h2>
        <div class="mistake-diff-bar" id="mistakeDiffBar">
            <button class="mistake-diff-btn" data-mistake-diff="easy">⭐ 简单</button>
            <button class="mistake-diff-btn" data-mistake-diff="medium">⭐⭐ 中等</button>
            <button class="mistake-diff-btn" data-mistake-diff="hard">⭐⭐⭐ 困难</button>
        </div>
        <div id="mistakeListContainer" class="mistake-list">
            <!-- 动态显示错题列表 -->
        </div>
        <button id="clearAllMistakesBtn" class="clear-all-mistake">🗑️ 清空当前难度错题</button>
    </div>
</div>

<script>
    // ---------- 原有配置 ----------
    const TOTAL_QS = 50;          
    let currentDifficulty = 'easy';   
    let currentQuestions = [];         
    let currentQIndex = 0;            
    let sessionActive = false;         
    let sessionFinished = false;       
    let startTimeStamp = 0;            
    let currentQuestionStartTime = 0;    
    let timerInterval = null;           
    let questionsTiming = [];           
    
    // DOM 元素
    const diffBtns = document.querySelectorAll('.difficulty-btn');
    const expressionDiv = document.getElementById('expressionText');
    const actionBtn = document.getElementById('actionMainBtn');
    const currentIndexSpan = document.getElementById('currentIndex');
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const slowTableBody = document.getElementById('slowTableBody');
    const restartBtn = document.getElementById('restartBtn');
    const openRecordBtn = document.getElementById('openRecordBtn');
    const modal = document.getElementById('recordModal');
    const closeModalSpan = document.querySelector('.close-modal');
    const modalDiffBtns = document.querySelectorAll('[data-modal-diff]');
    const historyBody = document.getElementById('historyBody');
    const fastestSpan = document.getElementById('fastestSpan');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const congratsMsgDiv = document.getElementById('congratsMsg');
    const markWrongBtn = document.getElementById('markWrongBtn');
    const openMistakeBtn = document.getElementById('openMistakeBtn');
    const mistakeModal = document.getElementById('mistakeModal');
    const closeMistakeModalSpan = document.getElementById('closeMistakeModal');
    const mistakeDiffBar = document.getElementById('mistakeDiffBar');
    const mistakeListContainer = document.getElementById('mistakeListContainer');
    const clearAllMistakesBtn = document.getElementById('clearAllMistakesBtn');
    
    // ---------- 错题本存储 ----------
    const MISTAKE_KEY_PREFIX = 'oral_mistakes_';
    function getMistakeKey(diff) {
        return `${MISTAKE_KEY_PREFIX}${diff}`;
    }
    // 加载某个难度的错题列表 (存储算式字符串数组)
    function loadMistakes(diff) {
        const key = getMistakeKey(diff);
        const raw = localStorage.getItem(key);
        if (!raw) return [];
        try {
            return JSON.parse(raw);
        } catch(e) { return []; }
    }
    // 保存错题
    function saveMistakes(diff, mistakes) {
        const key = getMistakeKey(diff);
        localStorage.setItem(key, JSON.stringify(mistakes));
    }
    // 添加错题 (当前题目)
    function addCurrentToMistakes() {
        if (!sessionActive || sessionFinished) {
            alert('请先开始练习，并在做题过程中收录错题');
            return;
        }
        if (currentQIndex >= 1 && currentQIndex <= TOTAL_QS) {
            const questionText = currentQuestions[currentQIndex-1].text;
            const mistakes = loadMistakes(currentDifficulty);
            mistakes.push(questionText);
            saveMistakes(currentDifficulty, mistakes);
            // 提示收录成功（轻反馈）
            const originalText = markWrongBtn.innerText;
            markWrongBtn.innerText = '✓ 已收录';
            setTimeout(() => {
                if (markWrongBtn) markWrongBtn.innerText = '❌ 错题收录';
            }, 800);
        } else {
            alert('没有有效的题目可收录');
        }
    }
    // 删除单个错题
    function deleteSingleMistake(diff, index) {
        const mistakes = loadMistakes(diff);
        mistakes.splice(index, 1);
        saveMistakes(diff, mistakes);
        refreshMistakeUI(diff); // 刷新当前显示的难度
    }
    // 清空当前难度的所有错题
    function clearCurrentMistakes() {
        if (confirm(`确定清空「${currentMistakeDiff === 'easy' ? '简单' : currentMistakeDiff === 'medium' ? '中等' : '困难'}」的所有错题吗？`)) {
            saveMistakes(currentMistakeDiff, []);
            refreshMistakeUI(currentMistakeDiff);
        }
    }
    
    let currentMistakeDiff = 'easy';
    // 刷新错题本UI
    function refreshMistakeUI(diff) {
        const mistakes = loadMistakes(diff);
        if (mistakes.length === 0) {
            mistakeListContainer.innerHTML = '<div style="text-align:center; padding:20px;">✨ 暂无错题，真棒！ ✨</div>';
            return;
        }
        let html = '';
        mistakes.forEach((item, idx) => {
            html += `
                <div class="mistake-item">
                    <span>📌 ${item}</span>
                    <button class="del-single" data-idx="${idx}">删除</button>
                </div>
            `;
        });
        mistakeListContainer.innerHTML = html;
        // 绑定删除按钮事件
        document.querySelectorAll('.del-single').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(btn.getAttribute('data-idx'));
                if (!isNaN(idx)) {
                    deleteSingleMistake(diff, idx);
                }
            });
        });
    }
    
    // 切换错题本内的难度
    function setMistakeDiff(diff) {
        currentMistakeDiff = diff;
        // 高亮按钮
        document.querySelectorAll('.mistake-diff-btn').forEach(btn => {
            if (btn.getAttribute('data-mistake-diff') === diff) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        refreshMistakeUI(diff);
    }
    
    // 打开错题本模态框
    function openMistakeModal() {
        setMistakeDiff(currentDifficulty); // 默认与当前练习难度同步，但可以切换
        mistakeModal.style.display = 'flex';
    }
    
    // ---------- 原有功能 ----------
    const STORAGE_PREFIX = 'oral_calc_';
    function getStorageKey(type) { return `${STORAGE_PREFIX}${type}`; }
    function loadRecords(diff) {
        const key = getStorageKey(diff);
        const raw = localStorage.getItem(key);
        if (!raw) return { records: [], fastest: null };
        try { return JSON.parse(raw); } catch(e) { return { records: [], fastest: null }; }
    }
    function saveRecords(diff, data) { localStorage.setItem(getStorageKey(diff), JSON.stringify(data)); }
    function addRecord(diff, totalSeconds) {
        const data = loadRecords(diff);
        const now = new Date();
        const dateStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        data.records.unshift({ dateStr, totalTime: totalSeconds.toFixed(1) });
        if (data.records.length > 30) data.records.pop();
        let fastest = data.fastest;
        if (fastest === null || totalSeconds < fastest) fastest = totalSeconds;
        data.fastest = fastest;
        saveRecords(diff, data);
        refreshModalUI();
    }
    function clearRecords(diff) { saveRecords(diff, { records: [], fastest: null }); refreshModalUI(); }
    let currentModalDiff = 'easy';
    function refreshModalUI() {
        const data = loadRecords(currentModalDiff);
        fastestSpan.innerHTML = data.fastest !== null ? `<span class="fastest-highlight">${data.fastest.toFixed(1)} 秒</span>` : '—';
        if (data.records.length === 0) historyBody.innerHTML = '<tr><td colspan="2">暂无记录</td></tr>';
        else {
            let html = '';
            data.records.forEach(rec => { html += `<tr><td>${rec.dateStr}</td><td>${rec.totalTime} 秒</td></tr>`; });
            historyBody.innerHTML = html;
        }
        document.querySelectorAll('.modal-diff-btn').forEach(btn => {
            if (btn.getAttribute('data-modal-diff') === currentModalDiff) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    // 题目生成 (与之前完全一致)
    function generateQuestionsByDifficulty(diff, count) {
        const questions = [];
        while(questions.length < count) {
            let q = null;
            if (diff === 'easy') q = generateEasyQuestion();
            else if (diff === 'medium') q = generateMediumQuestion();
            else q = generateHardQuestion();
            if (q) questions.push(q);
        }
        return questions;
    }
    function generateEasyQuestion() {
        const type = Math.floor(Math.random() * 3);
        if (type === 0) {
            let a = Math.floor(Math.random() * 10) * 10; if(a===0) a=10;
            let b = Math.floor(Math.random() * 10) * 10; if(b===0) b=10;
            const op = Math.random() < 0.5 ? '+' : '-';
            if(op === '+') { if(a+b <= 100) return { text: `${a}+${b}` }; else return null; }
            else { if(a>=b) return { text: `${a}-${b}` }; else return { text: `${b}-${a}` }; }
        } else if (type === 1) {
            let tens = (Math.floor(Math.random() * 9) + 1) * 10;
            let units = Math.floor(Math.random() * 9) + 1;
            if(tens + units <= 100) return { text: `${tens}+${units}` }; else return null;
        } else {
            let tens = (Math.floor(Math.random() * 9) + 1) * 10;
            let units = Math.floor(Math.random() * 9) + 1;
            let total = tens + units;
            if(total - units === tens && total>0 && units>0) return { text: `${total}-${units}` }; else return null;
        }
    }
    function generateMediumQuestion() {
        const isAdd = Math.random() < 0.5;
        const typeSub = Math.random() < 0.5 ? 'unit' : 'tens';
        if(isAdd) {
            if(typeSub === 'unit') {
                let tens = Math.floor(Math.random() * 9) + 1;
                let unitA = Math.floor(Math.random() * 10);
                let unitB = Math.floor(Math.random() * (9 - unitA));
                if(unitA + unitB <= 9) {
                    let num1 = tens*10 + unitA;
                    let num2 = unitB;
                    if(num2 === 0) return null;
                    if(num1+num2<=100) return { text: `${num1}+${num2}` };
                }
                return null;
            } else {
                let tens1 = Math.floor(Math.random() * 9) + 1;
                let tens2 = Math.floor(Math.random() * (9 - tens1 + 1));
                let unit = Math.floor(Math.random() * 10);
                let num1 = tens1*10 + unit;
                let num2 = tens2*10;
                if(num2>0 && num1+num2<=100) return { text: `${num1}+${num2}` }; else return null;
            }
        } else {
            if(typeSub === 'unit') {
                let tens = Math.floor(Math.random() * 9) + 1;
                let unitA = Math.floor(Math.random() * 10);
                let unitB = Math.floor(Math.random() * (unitA+1));
                let num1 = tens*10 + unitA;
                let num2 = unitB;
                if(num2>0 && num1-num2>=0) return { text: `${num1}-${num2}` }; else return null;
            } else {
                let tens1 = Math.floor(Math.random() * 9) + 1;
                let tens2 = Math.floor(Math.random() * tens1);
                let unit = Math.floor(Math.random() * 10);
                let num1 = tens1*10 + unit;
                let num2 = tens2*10;
                if(num2>0 && num1-num2>=0) return { text: `${num1}-${num2}` }; else return null;
            }
        }
    }
    function generateHardQuestion() {
        const isAdd = Math.random() < 0.5;
        if(isAdd) {
            const subType = Math.random() < 0.6 ? 'unit' : 'tens';
            if(subType === 'unit') {
                let tens = Math.floor(Math.random() * 9) + 1;
                let unitA = Math.floor(Math.random() * 10);
                let need = 10 - unitA;
                let unitB = Math.floor(Math.random() * (9 - need + 1)) + need;
                if(unitB>=1 && unitB<=9 && unitA+unitB>=10) {
                    let num1 = tens*10 + unitA;
                    let num2 = unitB;
                    if(num1+num2<=100) return { text: `${num1}+${num2}` };
                }
                return null;
            } else {
                let tens1 = Math.floor(Math.random() * 9) + 1;
                let tens2 = Math.floor(Math.random() * (9 - tens1 + 1)) + (10 - tens1);
                if(tens2<1) return null;
                let unit = Math.floor(Math.random() * 10);
                let num1 = tens1*10 + unit;
                let num2 = tens2*10;
                if(num1+num2<=100 && num2>0) return { text: `${num1}+${num2}` }; else return null;
            }
        } else {
            const subType = Math.random() < 0.6 ? 'unit' : 'tens';
            if(subType === 'unit') {
                let tens = Math.floor(Math.random() * 9) + 1;
                let unitA = Math.floor(Math.random() * 10);
                let unitB = Math.floor(Math.random() * (unitA+1)) + (unitA+1);
                if(unitB<=9 && unitB>unitA) {
                    let num1 = tens*10 + unitA;
                    let num2 = unitB;
                    if(num1-num2>=0) return { text: `${num1}-${num2}` };
                }
                return null;
            } else {
                let tens1 = Math.floor(Math.random() * 9) + 1;
                let tens2 = Math.floor(Math.random() * (tens1+1)) + tens1;
                if(tens2>9) tens2=9;
                if(tens2>tens1) {
                    let unit = Math.floor(Math.random() * 10);
                    let num1 = tens1*10 + unit;
                    let num2 = tens2*10;
                    if(num2>0 && num1-num2>=0) return { text: `${num1}-${num2}` };
                }
                return null;
            }
        }
    }
    
    function updateSlowTableAtEnd() {
        if(questionsTiming.length === 0) { slowTableBody.innerHTML = '<tr><td colspan="2">— 本轮无数据 —</td></tr>'; return; }
        const sorted = [...questionsTiming].sort((a,b) => b.timeSec - a.timeSec);
        const top5 = sorted.slice(0,5);
        let html = '';
        top5.forEach(item => { html += `<tr><td>${item.text}</td><td>${item.timeSec.toFixed(1)} s</td></tr>`; });
        slowTableBody.innerHTML = html;
    }
    function resetSlowTablePlaceholder() { slowTableBody.innerHTML = '<tr><td colspan="2">✨ 本轮结束后显示最慢题目 ✨</td></tr>'; }
    function recordCurrentQuestionTime() {
        if(!sessionActive) return;
        const elapsed = (performance.now() - currentQuestionStartTime) / 1000;
        if(currentQIndex >= 1 && currentQIndex <= TOTAL_QS) {
            const idx = currentQIndex-1;
            if(idx >=0 && idx < currentQuestions.length) {
                questionsTiming.push({ text: currentQuestions[idx].text, timeSec: elapsed });
            }
        }
    }
    function displayQuestion(index) {
        if(index >= 1 && index <= TOTAL_QS) {
            expressionDiv.innerText = currentQuestions[index-1].text;
            currentIndexSpan.innerText = index;
        }
    }
    function finishPractice(totalTime) {
        sessionFinished = true; sessionActive = false;
        if(timerInterval) clearInterval(timerInterval);
        timerDisplaySpan.innerText = totalTime.toFixed(1);
        addRecord(currentDifficulty, totalTime);
        actionBtn.innerText = "🏁 结束"; actionBtn.disabled = true;
        markWrongBtn.disabled = true;
        updateSlowTableAtEnd();
        congratsMsgDiv.classList.add('show');
    }
    function startPractice() {
        if(sessionFinished) resetPractice(true);
        currentQuestions = generateQuestionsByDifficulty(currentDifficulty, TOTAL_QS);
        currentQIndex = 0; questionsTiming = [];
        sessionActive = true; sessionFinished = false;
        displayQuestion(1); currentQIndex = 1;
        startTimeStamp = performance.now(); currentQuestionStartTime = startTimeStamp;
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(sessionActive && !sessionFinished) timerDisplaySpan.innerText = ((performance.now() - startTimeStamp) / 1000).toFixed(1);
        }, 100);
        actionBtn.innerText = "⏩ 下一题"; actionBtn.disabled = false;
        markWrongBtn.disabled = false;
        resetSlowTablePlaceholder();
        congratsMsgDiv.classList.remove('show');
    }
    function nextQuestion() {
        if(!sessionActive || sessionFinished) return;
        const elapsed = (performance.now() - currentQuestionStartTime) / 1000;
        if(currentQIndex >= 1 && currentQIndex <= TOTAL_QS) {
            questionsTiming.push({ text: currentQuestions[currentQIndex-1].text, timeSec: elapsed });
        }
        if(currentQIndex === TOTAL_QS) { finishPractice((performance.now() - startTimeStamp) / 1000); return; }
        currentQIndex++;
        displayQuestion(currentQIndex);
        currentQuestionStartTime = performance.now();
        actionBtn.innerText = (currentQIndex === TOTAL_QS) ? "🏁 结束" : "⏩ 下一题";
    }
    function handleMainClick() {
        if(sessionFinished) { resetPractice(true); startPractice(); return; }
        if(!sessionActive) startPractice();
        else nextQuestion();
    }
    function resetPractice(resetQuestions = true) {
        if(timerInterval) clearInterval(timerInterval);
        sessionActive = false; sessionFinished = false; currentQIndex = 0; questionsTiming = [];
        if(resetQuestions) currentQuestions = generateQuestionsByDifficulty(currentDifficulty, TOTAL_QS);
        if(currentQuestions.length > 0) expressionDiv.innerText = currentQuestions[0].text;
        currentIndexSpan.innerText = "0"; timerDisplaySpan.innerText = "0.0";
        actionBtn.innerText = "🚀 开始"; actionBtn.disabled = false;
        markWrongBtn.disabled = true;
        resetSlowTablePlaceholder(); congratsMsgDiv.classList.remove('show');
    }
    function setDifficulty(diff) {
        currentDifficulty = diff;
        diffBtns.forEach(btn => { if(btn.getAttribute('data-diff') === diff) btn.classList.add('active'); else btn.classList.remove('active'); });
        resetPractice(true);
        if(timerInterval) clearInterval(timerInterval);
        sessionActive = false; sessionFinished = false;
        actionBtn.innerText = "🚀 开始"; actionBtn.disabled = false;
        markWrongBtn.disabled = true;
        currentIndexSpan.innerText = "0"; timerDisplaySpan.innerText = "0.0";
        if(currentQuestions.length) expressionDiv.innerText = currentQuestions[0].text;
        congratsMsgDiv.classList.remove('show'); resetSlowTablePlaceholder();
    }
    
    // 事件绑定
    openRecordBtn.onclick = () => { currentModalDiff = currentDifficulty; refreshModalUI(); modal.style.display = 'flex'; };
    closeModalSpan.onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if(e.target === modal) modal.style.display = 'none'; if(e.target === mistakeModal) mistakeModal.style.display = 'none'; };
    modalDiffBtns.forEach(btn => { btn.onclick = () => { currentModalDiff = btn.getAttribute('data-modal-diff'); refreshModalUI(); }; });
    clearHistoryBtn.onclick = () => { if(confirm(`清除记录？`)) clearRecords(currentModalDiff); };
    restartBtn.onclick = () => { if(sessionActive && !confirm('重开会丢失当前进度，确定吗？')) return; resetPractice(true); if(timerInterval) clearInterval(timerInterval); sessionActive = false; sessionFinished = false; actionBtn.innerText = "🚀 开始"; actionBtn.disabled = false; markWrongBtn.disabled = true; currentIndexSpan.innerText = "0"; timerDisplaySpan.innerText = "0.0"; congratsMsgDiv.classList.remove('show'); resetSlowTablePlaceholder(); };
    markWrongBtn.onclick = addCurrentToMistakes;
    openMistakeBtn.onclick = openMistakeModal;
    closeMistakeModalSpan.onclick = () => mistakeModal.style.display = 'none';
    clearAllMistakesBtn.onclick = clearCurrentMistakes;
    // 错题本难度切换
    document.querySelectorAll('.mistake-diff-btn').forEach(btn => {
        btn.onclick = () => { setMistakeDiff(btn.getAttribute('data-mistake-diff')); };
    });
    
    function init() {
        setDifficulty('easy');
        diffBtns.forEach(btn => { btn.onclick = () => setDifficulty(btn.getAttribute('data-diff')); });
        actionBtn.onclick = handleMainClick;
        markWrongBtn.disabled = true;
    }
    init();
</script>
</body>
</html>
